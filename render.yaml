services:
  - type: web
    name: hermes-agent
    runtime: image

    image:
      url: docker.io/nousresearch/hermes-agent:latest

    plan: free
    region: ohio

    command: gateway run

    healthCheckPath: /health

    envVars:
      - key: HERMES_DASHBOARD
        value: "1"

      - key: HERMES_DASHBOARD_HOST
        value: "0.0.0.0"

      - key: API_SERVER_ENABLED
        value: "true"

      - key: API_SERVER_HOST
        value: "0.0.0.0"

      - key: API_SERVER_KEY
        generateValue: true

    disk:
      name: hermes-data
      mountPath: /opt/data
      sizeGB: 5
